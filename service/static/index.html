<!DOCTYPE html>
<html>
  <head>
    <title>Product Demo RESTful Service</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="/static/images/newapp-icon.png">
    <link rel="stylesheet" href="/static/css/cerulean_bootstrap.min.css">
  </head>
  <body>
    <div class="container">
      <div class="page-header">
          <h1>Product Demo REST API Service</h1>
      </div>

      <!-- Flash Message -->
      <div class="table-responsive">
        <table class="table">
          <tr><td>Status:</td><td><span id="flash_message"></span></td></tr>
        </table>
      </div>

      <!-- FORM -->
      <div class="col-md-12" id="form_data">
        <h3>Create, Retrieve, Activate, Deactivate, and Discontinue a Product:</h3>
        <div class="well">
          <div class="form-horizontal">
            <div class="form-group">
              <label class="control-label col-sm-2" for="product_sku">SKU:</label>
              <div class="col-sm-6">
                <input type="text" class="form-control" id="product_sku" placeholder="Enter SKU of Product">
              </div>
              <div class="col-sm-4">
                <button type="submit" class="btn btn-primary" id="activate-btn">Activate</button>
                <button type="submit" class="btn btn-primary" id="deactivate-btn">Deactivate</button>
                <button type="submit" class="btn btn-primary" id="discontinue-btn">Discontinue</button>
              </div>
            </div>
          </div> <!-- form horizontal -->

          <div class="form-horizontal">

            <!-- NAME -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="product_name">Name:</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="product_name" placeholder="Enter name for Product">
              </div>
            </div>

            <!-- DESCRIPTION -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="product_description">Description:</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="product_description" placeholder="Enter description for Product">
              </div>
            </div>

            <!-- PRICE -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="product_price">Price:</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="product_price" placeholder="Enter price for Product">
              </div>
            </div>

            <!-- IMAGE -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="product_image">Image:</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="product_image" placeholder="Enter image URL for Product">
              </div>
            </div>

            <!-- STATE -->
            <div class="form-group">
              <label class="control-label col-sm-2" for="product_state">State:</label>
              <div class="col-sm-10">
                <select class="form-control" id="product_state">
                  <option value="ACTIVE" selected>ACTIVE</option>
                  <option value="INACTIVE">INACTIVE</option>
                  <option value="DISCONTINUED">DISCONTINUED</option>
                </select>
              </div>
            </div>


            <!-- SUBMIT BUTTONS -->
            <div class="form-group">
              <div class="col-sm-offset-2 col-sm-10">
                <button type="submit" class="btn btn-primary" id="search-btn">Search</button>
                <button type="submit" class="btn btn-success" id="create-btn">Create</button>
              </div>
            </div>
          </div> <!-- form horizontal -->
        </div> <!-- end well -->
      </div> <!-- end Form -->
      
      <!-- Search Results -->
      <div class="table-responsive col-md-12" id="search_results">
        <table class="table table-striped">
          <thead>
          <tr>
            <th class="col-md-1">SKU</th>
            <th class="col-md-4">Name</th>
            <th class="col-md-4">Description</th>
            <th class="col-md-3">Price</th>
            <th class="col-md-3">Image</th>
            <th class="col-md-3">State</th>
          </tr>
          </thead>
        </table>
      </div>

      <footer>
        <br><br>
        <p>&copy; NYU DevOps Company 2022</p>
      </footer>

    </div> <!-- container -->

  <script type="text/javascript" src = "/static/js/jquery-3.6.0.min.js"></script>
  <script type="text/javascript" src = "/static/js/bootstrap.min.js"></script>

  <!-- YOUR REST API -->
  <script type="text/javascript" src="/static/js/rest_api.js"></script>

  </body>
</html>
